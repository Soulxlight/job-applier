<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Job Applier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2e3350;
      --text: #e2e8f0; --muted: #8892a4; --accent: #5b8dee;
      --red: #ef4444; --font: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 40px; width: 100%; max-width: 380px;
    }
    .brand {
      font-size: 20px; font-weight: 700; color: var(--accent);
      margin-bottom: 6px; text-align: center;
    }
    .subtitle {
      font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 32px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    label { font-size: 12px; color: var(--muted); font-weight: 500; }
    input[type="password"] {
      background: #0f1117; border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); padding: 10px 14px; font-size: 14px; width: 100%;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { outline: none; border-color: var(--accent); }
    .btn {
      width: 100%; padding: 11px; background: var(--accent); color: #fff;
      border: none; border-radius: 7px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s; margin-top: 4px;
    }
    .btn:hover { background: #4a7de0; }
    .error {
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
      color: #f87171; border-radius: 7px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 18px; text-align: center;
    }
    .rate-error {
      background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3);
      color: #fbbf24; border-radius: 7px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 18px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Job Applier</div>
    <div class="subtitle">Sign in to continue</div>

    {% if error == 'rate_limited' %}
    <div class="rate-error">Too many attempts — try again in a minute.</div>
    {% elif error %}
    <div class="error">Incorrect password.</div>
    {% endif %}

    <form method="post" action="{{ url_for('login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      {% if next %}
      <input type="hidden" name="next" value="{{ next }}">
      {% endif %}

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               autofocus autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
</body>
</html>
