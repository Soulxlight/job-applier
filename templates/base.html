<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Job Applier{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <nav class="sidebar">
    <div class="brand">Job Applier</div>
    <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' }}">Dashboard</a>
    <a href="{{ url_for('jobs') }}" class="{{ 'active' if request.endpoint == 'jobs' }}">Job Queue</a>
    <a href="{{ url_for('applications') }}" class="{{ 'active' if request.endpoint == 'applications' }}">Applications</a>
    <a href="{{ url_for('settings') }}" class="{{ 'active' if request.endpoint == 'settings' }}">Settings</a>
    <form method="post" action="{{ url_for('logout') }}" style="margin-top:auto;padding:16px 12px 0">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button type="submit" class="logout-btn">Sign Out</button>
    </form>
  </nav>
  <main class="content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
